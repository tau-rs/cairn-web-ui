name: coverage

# Measurement, not gating. Coverage is a signal to inform refactors and
# spot zero-coverage modules; never a hard threshold (a hard gate
# incentivizes test-for-coverage-not-correctness).

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    name: vitest coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.14.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Run vitest with coverage
        run: pnpm test:coverage
      - name: Summarise coverage
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            pct=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
            {
              echo "## Coverage baseline"
              echo
              echo "- **Line coverage:** ${pct}%"
              echo "- LCOV artifact attached to this run."
              echo
              echo "Coverage is a signal, not a gate."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No coverage-summary.json produced." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload lcov artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lcov-${{ github.sha }}
          path: web/coverage/lcov.info
          retention-days: 14
