name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
    types: [checks_requested]

# Cancel superseded runs on the same ref EXCEPT on main, mirroring the
# engine repo's policy (keeps the main-branch run that warms the
# setup-node/pnpm cache from being cancelled mid-write).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.14.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - uses: extractions/setup-just@v3
      - run: pnpm install --frozen-lockfile
      # Single source of truth: `just web-ci` reproduces the web gate verbatim
      # (lint, format:check, typecheck, test, build). See justfile / docs/ci.md.
      - run: just web-ci
        working-directory: ${{ github.workspace }}

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.14.0
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7

  tauri:
    name: tauri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install WebKitGTK + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev build-essential cmake
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - uses: extractions/setup-just@v3
      # Single source of truth: `just rust-ci` reproduces the tauri gate verbatim
      # (cargo fmt --check, clippy -D warnings, test). See justfile / docs/ci.md.
      - run: just rust-ci

  ci-summary:
    # Single aggregated status for branch protection: require this one
    # check. It is green only when every real job succeeded (or skipped).
    name: ci-summary
    if: always()
    needs: [web, e2e, tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Require all jobs to have succeeded
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "job results: $results"
          for r in $results; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::a required CI job did not succeed ($r)"; exit 1 ;;
            esac
          done
