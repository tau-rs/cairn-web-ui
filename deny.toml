# cargo-deny configuration for the src-tauri Rust shell.
# Run via `just rust-deny` (local + CI T1 gate). Tuned to pass on the
# current dependency tree; widen `licenses.allow` if a new dep introduces
# a permissive license not yet listed.

[advisories]
version = 2
# RustSec advisory DB. Fail the gate on any unfixed vulnerability or yanked
# crate (the checks that matter for a shipped binary).
yanked = "deny"
# Only flag *unmaintained* advisories for first-party workspace crates, not
# the transitive tree. The Tauri dep graph pulls in a long tail of
# unmaintained-but-not-vulnerable crates (gtk-rs GTK3 bindings via
# tauri-runtime-wry, proc-macro-error via tauri-macros, unic-* via
# urlpattern/tauri-utils) that we cannot fix without Tauri upgrading them.
# Enumerating their RUSTSEC ids would rot as new advisories land on the same
# crates; "workspace" scopes the noise out while keeping real vulnerability
# advisories gating. Re-evaluate if cairn-ui's own crates ever go unmaintained.
unmaintained = "workspace"
# Documented vulnerability exceptions. Each is a transitive advisory we cannot
# remediate from this repo because a parent crate pins the vulnerable major;
# the fix must land upstream first, then flow here via a version bump. Re-check
# and drop each id once its upstream gate clears.
ignore = [
    # glib <0.20 unsoundness in VariantStrIter Iterator impls (RUSTSEC-2024-0429).
    # Pinned by gtk 0.18.2 -> tauri 2.11.2; Linux-only (gtk-rs GTK3 stack, not in
    # the macOS build tree). Clears when Tauri moves to the gtk-rs 0.20 ecosystem.
    "RUSTSEC-2024-0429",
    # git2 <0.20.4 UB dereferencing the Buf struct (RUSTSEC-2026-0008). Pinned by
    # the cairn engine crate (cairn-infra, git-rev dep requiring git2 ^0.19);
    # 0.19->0.20 is a breaking bump only the engine can make. Clears when the
    # engine bumps git2 and we re-pin its rev in Cargo.toml.
    "RUSTSEC-2026-0008",
]

[licenses]
version = 2
confidence-threshold = 0.8
# Permissive licenses present in (or expected for) the Tauri dep tree.
# Extend as needed — `cargo deny check licenses` names any rejected one.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
]

# The cairn-ui shell crate (app v0.1.0) is a private Tauri scaffold with no
# license declaration. Clarify it as MIT so the gate passes; the crate is not
# published to crates.io and has no external consumers.
[[licenses.clarify]]
crate = "app@0.1.0"
expression = "MIT"
license-files = []

[bans]
# Duplicate versions are a hygiene signal, not a merge blocker here.
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
# cairn-* workspace deps are git-pinned by rev; allow git sources.
unknown-git = "allow"
